<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Kimmy's Valuelist</title>
    <script>
      var base = '/kimmys-valuelist';
      var path = window.location.pathname;

      // If they hit the bare root (kimmyvals.github.io with no path),
      // just send them straight to the site
      if (path === '/' || path === '') {
        window.location.replace(base + '/');
      } else {
        // Otherwise it's a deep-link refresh — do the SPA redirect
        var sub = path.replace(base, '') || '/';
        window.location.replace(base + '/?p=' + encodeURIComponent(sub + window.location.search) + window.location.hash);
      }
    </script>
  </head>
  <body></body>
</html>
