<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Kimmy's Valuelist</title>
    <script>
      // GitHub Pages SPA redirect
      // Encodes the path into a query string so index.html can pick it up
      var base = '/kimmys-valuelist';
      var path = window.location.pathname.replace(base, '') || '/';
      var search = window.location.search;
      var hash = window.location.hash;
      var redirect = base + '/?p=' + encodeURIComponent(path + search) + hash;
      window.location.replace(redirect);
    </script>
  </head>
  <body></body>
</html>
